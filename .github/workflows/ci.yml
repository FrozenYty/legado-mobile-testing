name: CI Compile Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile instrumented test sources
        working-directory: app-under-test/legado-master
        run: |
          chmod +x gradlew
          ./gradlew :app:compileAppDebugAndroidTestSources

      - name: Compile unit test sources
        working-directory: app-under-test/legado-master
        run: ./gradlew :app:compileAppDebugUnitTestSources

      - name: Run unit tests
        working-directory: app-under-test/legado-master
        run: ./gradlew :app:testAppDebugUnitTest
